name: News Refresh

on:
  schedule:
    # alle 30 Minuten
    - cron: "*/30 * * * *"
  workflow_dispatch:
    # manueller Trigger via "Run workflow"-Button

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/cron/news-refresh
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing GitHub Secret APP_URL or CRON_SECRET"
            exit 1
          fi
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}\n" \
            -X POST "$APP_URL/api/cron/news-refresh" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 90)
          echo "$response"
          status=$(echo "$response" | grep "HTTP_STATUS:" | cut -d: -f2)
          if [ "$status" != "200" ]; then
            echo "::error::News-Refresh failed with HTTP $status"
            exit 1
          fi
